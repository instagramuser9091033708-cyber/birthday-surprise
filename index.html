<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" src="music/music.mp3"></audio>

<!-- PAGE -->
<div class="page active" id="page1">
  <h1 class="fade">Loading Surprise 🎁</h1>
</div>

<div class="page" id="page2">
  <h2>Someone special born on 🎂</h2>
  <h1 id="birth"></h1>
  <h2 id="age"></h2>
  <button onclick="nextPage(3)">Next</button>
</div>

<div class="page" id="page3">
  <h1>Ready for Surprise? 😍</h1>
  <button onclick="start()">Start</button>
</div>

<div class="page" id="page4">

  <!-- 🎂 Cake -->
  <div class="cake-container">
    <img src="images/cake.png" class="cake-img">
    <div class="flame"></div>
  </div>

  <button onclick="lightCandle()">Light Candle 🔥</button>
  <button onclick="createBalloons()">Balloons 🎈</button>

  <div id="balloonBox"></div>
  <h2 id="message"></h2>

  <button onclick="nextPage(5)">Next</button>
</div>

<div class="page" id="page5">
  <h1 class="glow">✨ Happy Birthday 🎂 ✨</h1>
</div>

<script src="script.js"></script>
</body>
</html>
